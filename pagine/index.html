<!--
REQUISITI DI PROGETTO
- Landing page
- Pagina "chi  sono / chi siamo"
- Form di iscrizione newsletter nella landing page (nome, cognome, ddn, checkbox)
- Responsive design (computer + smartphone)
- Prodotti e servizi (con immagini / video)
- Navbar e footer con link e collegamenti
-->
<!doctype html>
<html lang="it">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing page&semi;</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="parallax-container">
      <ul class="parallax">
        <p>Scroll Down</p>
        <li class="layer"></li>
        <li class="layer"></li>
        <li class="layer"></li>
        <li class="layer"></li>
        <li class="layer"></li>
        <li class="layer"></li>
      </ul>
      <div class="landing-container">
        <header>
          <div id="logo">
            <h1>Darabi</h1>
          </div>
          <nav>
            <div id="link">
              <a href="#prodotti">chi siamo</a>
              <a href="#prodotti">prodotti</a>
              <a href="#Contatti">contatti</a>
            </div>
          </nav>
          <div id="login-signup">
            <div class="sign-up">
              <img
                src="../assets/immagini/add-user.png"
                alt="sign-up"
                width="25"
                height="25"
              />
              <div class="sign-up-modal">
                <form>
                  <h1>Iscrizione</h1>
                  <input type="text" id="sign-up-name" placeholder="Nome" required>
                  <input type="text" id="sign-up-lastname" placeholder="Cognome" required>
                  <input type="email" name="sign-up-email" id="sign-up-email" placeholder="Email" required>
                  <input type="password" name="sign-up-password" id="sign-up-password" placeholder="Password" required>
                  <input type="submit" value="Iscrivi">
                </form>
              </div>
            </div>
            <div class="login">
              <img
                src="../assets/immagini/user.png"
                alt="login"
                width="25"
                height="25"
              />
              <div class="login-modal">
                <form>
                  <h1>Login</h1>
                  <input type="email" name="login-email" id="login-email" placeholder="Email" required>
                  <input type="password" name="login-password" id="login-password" placeholder="Password" required>
                  <input type="submit" value="Login">
                </form>
              </div>
            </div>
          </div>
        </header>
        <section class="landing">
          <div class="first-look">
            <div id="hero">
              <p>Scopri</p>
              <p>Responsive</p>
              <p>Web Design</p>
              <span
                >Il responsive web design è un approccio di progettazione che
                adatta automaticamente il layout di un sito alle diverse
                dimensioni degli schermi</span
              >
              <!-- <button id="contatti">contatti</button> -->
            </div>
            <div>
              <img
                id="check"
                src="../assets/immagini/Responsive_Web_Design_Demo_Template.svg"
                alt="Responsive"
                width="400"
              />
            </div>
          </div>
        </section>
      </div>
    </div>
    <aside></aside>
    <section class="more">
      <h1 id="prodotti" class="RWB">RWB</h1>
      <div class="carosel">
        <div class="container" data-mouse-down-at="0" data-mouse-now="0">
          <img
            src="../assets/immagini/flexible-images.jpg"
            alt="nature1"
            width="500"
            height="300"
            draggable="false"
          />
          <img
            src="../assets/immagini/Content-is-like-water.png"
            alt="nature2"
            width="500"
            height="300"
            draggable="false"
          />
          <img
            src="../assets/immagini/fluid-design-1-20250321-2389857.webp"
            alt="nature3"
            width="500"
            height="300"
            draggable="false"
          />
          <img
            src="../assets/immagini/Media-Queries.webp"
            alt="nature4"
            width="500"
            height="300"
            draggable="false"
          />
          <img
            src="../assets/immagini/Responsive_Web_Design_Demo_Template.svg"
            alt="nature5"
            width="500"
            height="300"
            draggable="false"
          />
        </div>
      </div>
      <div id="Contatti" class="contatti">
        <form>
          <h1>Newsletter</h1>
          <div>
            <input
              type="text"
              name="Nome"
              id="Nome"
              placeholder="Nome (Obligatorio)"
              required
            />
            <span></span>
          </div>
          <div>
            <input
              type="text"
              name="Cognome"
              id="Cognome"
              placeholder="Cognome (Obligatorio)"
              required
            />
            <span></span>
          </div>
          <div class="DDN">
            <label for="DDN">Data di nascita</label>
            <div>
              <input type="date" name="DDN" id="DDN" required />
              <span></span>
            </div>
          </div>
          <div>
            <input
              type="email"
              name="Email"
              id="Email"
              placeholder="Email (Obligatorio)"
              required
            />
            <span></span>
          </div>
          <div class="Newsletter">
            <p>Newsletter:</p>
            <div>
              <label for="Accetto">Accetto</label>
              <input
                type="radio"
                name="Newsletter"
                id="Accetto"
                value="Accetto"
                required
              />
              <span></span>
            </div>
            <div>
              <label for="NonAccetto">Non Accetto</label>
              <input
                type="radio"
                name="Newsletter"
                id="NonAccetto"
                value="Non Accetto"
                required
              />
              <span></span>
            </div>
          </div>
          <div class="tos">
            <p>Privacy:</p>
            <input type="checkbox" name="tos" id="tos" required />
            <span></span>
          </div>
          <input type="submit" value="Invia" />
        </form>
      </div>
    </section>
    <footer>
      <div id="social">
        <img
          src="../assets/immagini/facebook.png"
          alt="facebook"
          width="25"
          height="25"
        />
        <img
          src="../assets/immagini/instagram.png"
          alt="instagram"
          width="25"
          height="25"
        />
        <img
          src="../assets/immagini/twitter.png"
          alt="twitter"
          width="25"
          height="25"
        />
        <img
          src="../assets/immagini/whatsapp.png"
          alt="whatsapp"
          width="25"
          height="25"
        />
      </div>
      <div id="footer-logo">
        <h2>Darabi</h2>
      </div>
    </footer>
    <script src="../main.js"></script>
  </body>
</html>
